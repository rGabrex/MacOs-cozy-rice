[os]
disabled = false
style = "bg:#2e2a20 fg:#8aab6e"

[os.symbols]
Macos = "ůįÄĶ"

[directory]
style = "bg:#3d3828 fg:#c8b49a"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"
read_only = " ůįĆĺ"

[git_branch]
symbol = ""
style = "bg:#242018 fg:#8aab6e"
format = "[‚Ėď‚Ėí‚ĖĎ](bg:#242018 fg:#3d3828)[ $symbol $branch ]($style)"

[git_status]
style = "bg:#242018 fg:#d4956a"
format = "[ $all_status$ahead_behind ]($style)"
conflicted = "ůį©Ć "
ahead = "ůį∂£ "
behind = "ůį∂° "
diverged = "ůį©Ć "
untracked = "ůįčó "
stashed = "ůįŹó "
modified = "ůįĚ∂ "
staged = "ůįźó "
deleted = "ůįć∂ "

[fill]
symbol = " "

[battery]
format = "[ $symbol$percentage ]($style) "
[[battery.display]]
threshold = 20
style = "fg:#d4956a"
[[battery.display]]
threshold = 50
style = "fg:#c8b49a"
[[battery.display]]
threshold = 100
style = "fg:#8aab6e"

[status]
disabled = false
symbol = "‚úó "
success_symbol = ""
format = "[$symbol$status ]($style)"
style = "fg:#d4956a bold"

[time]
disabled = false
time_format = "%H:%M"
style = "bg:#2e2a20 fg:#8aab6e"
format = "[ ůį•Ē $time ]($style)"

[cmd_duration]
min_time = 2_000
style = "fg:#c8b49a"
format = "[ ůĪ¶ü $duration ]($style) "

[nodejs]
symbol = "ůįéô"
style = "fg:#8aab6e"
format = "[ $symbol $version ]($style) "

[python]
symbol = "ůįĆ†"
style = "fg:#8aab6e"
format = "[ $symbol $version ]($style) "

[swift]
